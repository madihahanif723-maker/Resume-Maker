<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <link rel="stylesheet" href="style.css">
</head>

<body>
      <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="sign-up card shadow p-4" style="width: 100%; max-width: 400px;">
        
        <h3 class="text-center mb-4">Create Account</h3>

        <form>
           <label> Username: <input type="text" id="signName" class="mb-3" placeholder="Username" required></label>

            <label> Email: <input type="email" id="signEmail" class="mb-3" placeholder="Email" required></label>

            <label> Password: <input type="password" id="signPassword" class=" mb-3" placeholder="Password" required></label>

            <button type="button" onclick="signup()" class="btn btn-success w-100 mb-2">
                Sign Up
            </button>
        </form>

        <p class="text-center mt-2">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        

    <script src="app.js"></script>
</body>

</html>
