<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select CV Template</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">CV Builder</a>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container py-5 temp">

        <div class="text-center mb-5">
            <h1 class="fw-bold text-white">Choose Your CV Template</h1>
            <p class="text-white">Select a professional template for your CV</p>
        </div>

        <div class="row g-4 justify-content-center">

            <!-- Template 1 -->
            <div class="col-lg-4 col-md-6">
                <div class="template-card glass-card">
                    <div class="template-preview template-one">
                        <h4>Modern CV</h4>
                        <p>Clean and professional design</p>
                    </div>

                    <div class="p-3 text-center">
                        <button class="btn btn-light w-100 select-template" data-template="modern">
                            Select Template
                        </button>
                    </div>
                </div>
            </div>

            <!-- Template 2 -->
            <div class="col-lg-4 col-md-6">
                <div class="template-card glass-card">
                    <div class="template-preview template-two">
                        <h4>Creative CV</h4>
                        <p>Elegant modern style layout</p>
                    </div>

                    <div class="p-3 text-center w-100">
                        <button class="btn btn-light widthsel select-template" data-template="creative">
                            Select Template
                        </button>
                    </div>
                </div>
            </div>

            <!-- Template 3 -->
            <div class="col-lg-4 col-md-6">
                <div class="template-card glass-card">
                    <div class="template-preview template-three">
                        <h4>Minimal CV</h4>
                        <p>Simple and lightweight design</p>
                    </div>

                    <div class="p-3 text-center">
                        <button class="btn btn-light w-100 select-template" data-template="minimal">
                            Select Template
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="app.js"></script>



</body>

</html>
