<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Professional CV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">


</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-9">

                <div class="cv-card" id="printArea">
                    <div class="text-center mb-4">
                        <img id="displayImg" src="" alt="Profile" class="profile-img" style="display:none;">
                        <h1 id="displayName" class="display-4 fw-bold">---</h1>
                        <p class="lead">
                            <span id="displayEmail">---</span> | <span id="displayPhone">---</span>
                        </p>
                    </div>

                    <div class="mb-4">
                        <h3 class="section-title text-uppercase h5">Executive Summary</h3>
                        <div id="displayAbout" class="mt-2">---</div>
                    </div>

                    <div class="row">
                        <div class="col-md-7">
                            <h3 class="section-title text-uppercase h5">Work Experience</h3>
                            <div id="displayExperience" style="white-space: pre-wrap;">---</div>

                            <h3 class="section-title text-uppercase h5">Education</h3>
                            <div id="displayEducation" style="white-space: pre-wrap;">---</div>
                        </div>

                        <div class="col-md-5">
                            <h3 class="section-title text-uppercase h5">Professional Skills</h3>
                            <div id="displaySkills" class="mt-2"></div>

                            <h3 class="section-title text-uppercase h5">Languages</h3>
                            <div id="displayLanguages" class="mt-2"></div>
                        </div>
                    </div>
                </div>

                <div class="text-center mb-5 no-print">
                    <button onclick="window.print()" class="btn btn-primary btn-lg me-3">Download as PDF</button>
                    <button onclick="window.location.href='cvcreation.html'" class="btn btn-outline-light btn-lg">Edit
                        Information</button>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="app.js"></script>
</body>

</html>
