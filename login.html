<!DOCTYPE html>
<html>

<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <main class="site-main">
        <section class="login-section">
            <div class="container">
                <div class="login-box mx-auto mt-5 p-4">
                    <h1 class="login-title">Login</h1>
                    <p class="login-subtitle">Welcome back! Enter your details to login.</p>
                    <form>
                        <div class="mb-4">
                            <label class="login-label" for="login-email">Email</label>
                            <input id="login-email"  type="email" class="form-control login-input" placeholder="Your Email">
                        </div>
                        <div class="mb-4">
                            <label class="login-label" for="login-password">Password</label>
                            <div class="position-relative">
                                <input id="login-password" type="password" class="form-control login-input" placeholder="Your Password">
                                <span class="password-toggle">&#128065;</span>
                            </div>
                        </div>
                        <button type="submit" onclick="login()" class="login-button">Log In</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="app.js"></script>
</body>

</html>
